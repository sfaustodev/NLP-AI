# Vox Probabilis · nginx virtual host
#
# Deployment model (agreed with Juan, 2026-04-18):
#
#   * Docker stack already owns :80 on this VPS — DO NOT touch it.
#   * This file binds to :443 ONLY, behind a Cloudflare-fronted DNS.
#   * Cloudflare handles the :80 → :443 redirect at the edge; we don't
#     need a redirecting server{} block of our own.
#   * The existing Rust `nda-backend` service on :3000 stays untouched;
#     it serves a different hostname.
#
# Install:
#     sudo ln -s /opt/voxprobabilis/backend/deploy/nginx.conf \
#                /etc/nginx/sites-enabled/voxprobabilis
#     sudo nginx -t && sudo systemctl reload nginx
#
# TLS: once the domain is bought and DNS is live, obtain certs with:
#     sudo certbot --nginx -d voxprobabilis.com -d www.voxprobabilis.com
# certbot will rewrite the `ssl_certificate*` lines below. Until then,
# the self-signed snakeoil cert is enough to bring nginx up so we can
# test via the raw IP + SNI override.

upstream vox_probabilis_backend {
    # uvicorn loopback; see voxprobabilis.service.
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name voxprobabilis.com www.voxprobabilis.com;

    # Placeholders — certbot will replace these at deploy time.
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ---- Uploads ----------------------------------------------------
    # SPEC §11.1 caps audio at 10 MB; give nginx a slight margin so an
    # exactly-10MB upload with protocol overhead still reaches Python
    # where the precise length check lives.
    client_max_body_size 12m;
    client_body_timeout  30s;

    # ---- Gzip -------------------------------------------------------
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- Security headers -------------------------------------------
    # X-Frame-Options kept at SAMEORIGIN rather than DENY because the
    # academic preview tools (Semantic Scholar, Zenodo) occasionally
    # embed a page via iframe for the landing preview.
    add_header X-Frame-Options            "SAMEORIGIN"   always;
    add_header X-Content-Type-Options     "nosniff"      always;
    add_header Referrer-Policy            "same-origin"  always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # ---- API -------------------------------------------------------
    location /api/ {
        proxy_pass         http://vox_probabilis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ---- Static landing page (served by FastAPI) --------------------
    # Everything else proxies to uvicorn, which serves index.html at /
    # and static assets under /assets/*. We route everything rather
    # than split because the landing page is tiny and the single hop
    # avoids a whole class of "nginx serves stale file after deploy"
    # bugs.
    location / {
        proxy_pass         http://vox_probabilis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 10s;
    }
}
