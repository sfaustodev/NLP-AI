# Vox Probabilis · nginx virtual host
#
# Deployment model (DEPLOY.md §7, supersedes pre-Cloudflare draft):
#
#   * Cloudflare proxied (orange cloud) for both static + /api/* paths.
#   * Edge → Origin TLS: Cloudflare SSL/TLS mode = "Full (strict)".
#     Origin certificate (15-yr) and key live in
#     /etc/ssl/voxprobabilis/{cert,key}.pem (key 0600, owner root:root).
#   * uvicorn binds 127.0.0.1:8002 (DEPLOY §6.1; see voxprobabilis.service).
#   * The existing Rust service on this nginx instance MUST remain
#     untouched. This file declares its own server_name explicitly so
#     Host-based routing wins regardless of default_server placement.
#
# Install:
#     sudo ln -s /opt/voxprobabilis/backend/deploy/nginx.conf \
#                /etc/nginx/sites-enabled/voxprobabilis
#     sudo nginx -t && sudo systemctl reload nginx
#
# WARNING — set_real_ip_from collides if the Rust vhost already declares
# Cloudflare prefixes. If `nginx -t` reports duplicate upstream errors,
# move the set_real_ip_from block to /etc/nginx/conf.d/cloudflare.conf
# at the http level (one declaration per box) and remove it here.

# ---- Rate limit zones (http-level shared memory) ---------------------
# 10 MB per zone tracks ≈160 K distinct client IPs each. Bursts let
# bursts through without delay; sustained abuse gets 429.
limit_req_zone $binary_remote_addr zone=voxapi:10m    rate=10r/s;
limit_req_zone $binary_remote_addr zone=voxupload:10m rate=2r/s;

# ---- Cloudflare → real client IP -------------------------------------
# Source: https://www.cloudflare.com/ips-v4 (15 prefixes as of 2024).
# Without these, $remote_addr is a Cloudflare edge IP, which breaks
# our app-level rate limiter (everyone shares the same hash).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

upstream vox_probabilis_backend {
    server 127.0.0.1:8002 fail_timeout=0;
    keepalive 16;
}

# Note: no :80 server block on purpose. Docker-proxy already owns :80
# on this VPS (the appnda.com landing). Cloudflare's edge "Always Use
# HTTPS" handles client HTTP → HTTPS redirects upstream of us, so we
# never see plain-HTTP requests at the origin.

# ---- Main HTTPS server -----------------------------------------------
server {
    listen      443 ssl http2;
    listen [::]:443 ssl http2;
    server_name voxprobabilis.com www.voxprobabilis.com;

    # Cloudflare Origin certificate (15-yr validity per DEPLOY §3.4).
    ssl_certificate     /etc/ssl/voxprobabilis/cert.pem;
    ssl_certificate_key /etc/ssl/voxprobabilis/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # ---- Uploads ----------------------------------------------------
    # SPEC §11.1 caps audio at 10 MB; nginx margin allows the precise
    # length check to fire in Python rather than nginx-aborting.
    client_max_body_size 12m;
    client_body_timeout  30s;

    # ---- Gzip -------------------------------------------------------
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- Security headers -------------------------------------------
    # HSTS without includeSubDomains so future staging.voxprobabilis.com
    # doesn't get force-locked to HTTPS before its cert is wired up.
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "microphone=(self), geolocation=()"    always;
    add_header Strict-Transport-Security "max-age=15768000"                     always;
    # Cloudflare Web Analytics: in proxied (orange-cloud) mode the beacon
    # POSTs to same-origin /cdn-cgi/rum, so connect-src 'self' is enough;
    # only static.cloudflareinsights.com (beacon script) must be added.
    # media-src blob: covers MediaRecorder blob playback in /coach.
    # object-src + base-uri close cheap CSP gaps (base-uri does not inherit
    # from default-src, so a missing directive lets injected <base> rewrite
    # all relative URLs).
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; connect-src 'self'; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    access_log /var/log/nginx/voxprobabilis-access.log;
    error_log  /var/log/nginx/voxprobabilis-error.log warn;

    # ---- Audio uploads — stricter per-IP limit ----------------------
    # Order matters: regex location wins over /api/ prefix below.
    location ~ ^/api/(calibrate|analyze)$ {
        limit_req zone=voxupload burst=5 nodelay;

        proxy_pass         http://vox_probabilis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout       60s;
        proxy_send_timeout       60s;
        proxy_request_buffering  on;
    }

    # ---- Other API calls --------------------------------------------
    location /api/ {
        limit_req zone=voxapi burst=20 nodelay;

        proxy_pass         http://vox_probabilis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering    off;
    }

    # ---- Landing page + /privacy + /terms (FastAPI-served) ----------
    location / {
        proxy_pass         http://vox_probabilis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 10s;
    }
}
